<div>
@for(item of todoItemList; track item.title ){
    <div class="flex justify-around p-2">
        <div class="border-b w-50"><span><label for={{item.title}}>{{item.title}}</label></span></div>
        <div><input  type="checkbox" (click)="triggerUpdateItem(item.id)" id={{item.title}} name={{item.title}} value={{item.done}}></div>
        <div>{{item.cdate}}</div>
    </div>
}
</div>
