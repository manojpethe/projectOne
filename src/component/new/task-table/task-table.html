
<div class="h-[300px] overflow-auto">
<div class="">
@for(item of todoService.TodoItemList(); track item.title ){
    <div class="flex justify-around p-2 scroll-auto">
        <div class="border-b w-50"><span><label for={{item.title}}>{{item.title}}</label></span></div>
        <div><input  type="checkbox" (click)="todoService.updateItem(item.id)" id={{item.title}} name={{item.title}} value={{item.done}}></div>
        <div>{{item.cdate}}</div>
    </div>
}
</div>
</div>
